<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C1PH3R-BOX // Decryption Unit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --green: #00ff41;
            --green-dim: #00aa2a;
            --green-dark: #004d14;
            --green-glow: #00ff4180;
            --amber: #ffb000;
            --amber-dim: #aa7500;
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --bg-inset: #050505;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --text-dim: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100dvh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px,
                    rgba(0, 255, 65, 0.015) 2px, rgba(0, 255, 65, 0.015) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        .header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
        }

        .header-id {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0, 255, 65, 0.2);
        }

        .header-sub {
            font-size: 10px;
            color: var(--green-dim);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .main {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-label {
            font-size: 10px;
            color: var(--amber);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .rotor-group {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 12px;
        }

        .rotor-block {
            margin-bottom: 10px;
        }

        .rotor-block:last-of-type {
            margin-bottom: 0;
        }

        .rotor-row {
            display: flex;
            align-items: center;
            gap: 6px;
            touch-action: none;
        }

        .rotor-label {
            font-size: 10px;
            color: var(--amber);
            letter-spacing: 1px;
            width: 20px;
            flex-shrink: 0;
        }

        .rotor-display {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: grab;
        }

        .rotor-display.swiping {
            cursor: grabbing;
        }

        .bit-cell {
            flex: 1;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            font-size: 15px;
            font-weight: 500;
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .bit-cell.highlight {
            background: rgba(0, 255, 65, 0.08);
            border-color: var(--green-dark);
        }

        .rotor-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .shift-btn {
            width: 34px;
            height: 34px;
            background: var(--bg-inset);
            border: 1px solid var(--border-light);
            color: var(--green-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.1s ease;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .shift-btn:active {
            background: var(--green-dark);
            border-color: var(--green);
            color: var(--green);
        }

        .shift-value {
            font-size: 12px;
            color: var(--green-dim);
            font-family: 'Share Tech Mono', monospace;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Shift indicator: 11 pips, pip 0 is amber (zero-marker) */
        .shift-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
            margin-bottom: 4px;
            padding-left: 26px;
        }

        .shift-pip {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-light);
            transition: all 0.15s ease;
        }

        .shift-pip.active {
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
        }

        .shift-pip.zero-marker {
            border: 1px solid var(--amber-dim);
            background: transparent;
        }

        .shift-pip.zero-marker.active {
            background: var(--amber);
            border-color: var(--amber);
            box-shadow: 0 0 5px var(--amber);
        }

        .swipe-hint {
            font-size: 9px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* Operation */
        .op-section {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 12px;
        }

        .op-selector {
            display: flex;
            gap: 4px;
        }

        .op-btn {
            flex: 1;
            height: 44px;
            background: var(--bg-inset);
            border: 1px solid var(--border-light);
            color: var(--green-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .op-btn .op-index {
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .op-btn.active {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.15);
        }

        .op-btn:active {
            transform: scale(0.97);
        }

        /* Output */
        .output-section {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 12px;
        }

        .output-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .output-binary {
            display: flex;
            gap: 2px;
            margin-bottom: 10px;
        }

        .out-bit {
            flex: 1;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            font-size: 15px;
            font-weight: 700;
            font-family: 'Share Tech Mono', monospace;
            color: var(--amber);
            transition: all 0.2s ease;
        }

        .output-decimal {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 2px;
        }

        .output-dec-label {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .output-dec-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--amber);
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 15px rgba(255, 176, 0, 0.4);
            letter-spacing: 2px;
        }

        .output-section.no-op .out-bit {
            color: var(--text-dim);
        }

        .output-section.no-op .output-dec-value {
            color: var(--text-dim);
            text-shadow: none;
        }

        .output-section.success {
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .output-section.success .out-bit {
            color: var(--green);
            border-color: var(--green-dark);
            text-shadow: 0 0 8px var(--green-glow);
        }

        .output-section.success .output-dec-value {
            color: var(--green);
            text-shadow: 0 0 15px var(--green-glow);
        }

        .bip39-result {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--green-dark);
            border-radius: 2px;
            text-align: center;
        }

        .bip39-result.visible {
            display: block;
            animation: reveal 0.5s ease;
        }

        .bip39-word {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--green);
            text-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0, 255, 65, 0.2);
        }

        .bip39-hint {
            font-size: 9px;
            color: var(--green-dim);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .footer {
            padding: 12px 16px;
            text-align: center;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 1px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        @media (min-width: 420px) {

            .bit-cell,
            .out-bit {
                height: 40px;
                font-size: 16px;
            }

            .header-title {
                font-size: 20px;
            }

            .output-dec-value {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-id">UNIT #5 — SERIAL 0xC1PH3R-7F2A</div>
        <div class="header-title">C1PH3R-BOX</div>
        <div class="header-sub">Binary Decryption Unit v2.1 — 3-Rotor Configuration</div>
    </div>

    <div class="status-bar" id="status-bar">
        <div class="status-dot"></div>
        <span>SYSTEM READY — SELECT OPERATION</span>
    </div>

    <div class="main">
        <div>
            <div class="section-label">Input rotors</div>
            <div class="rotor-group" id="rotor-group">
                <!-- Rotors built by JS -->
            </div>
        </div>

        <div class="op-section">
            <div class="section-label">Logical op</div>
            <div class="op-selector" id="op-selector">
                <button class="op-btn" data-op="0" id="op-0">
                    <span>AND</span><span class="op-index">[0]</span>
                </button>
                <button class="op-btn" data-op="1" id="op-1">
                    <span>OR</span><span class="op-index">[1]</span>
                </button>
                <button class="op-btn" data-op="2" id="op-2">
                    <span>XOR</span><span class="op-index">[2]</span>
                </button>
            </div>
        </div>

        <div class="output-section no-op" id="output-section">
            <div class="output-label">Output</div>
            <div class="output-binary" id="output-bits"></div>
            <div class="output-decimal">
                <span class="output-dec-label">DEC</span>
                <span class="output-dec-value" id="output-dec">----</span>
            </div>
            <div class="bip39-result" id="bip39-result">
                <div class="bip39-word" id="bip39-word"></div>
                <div class="bip39-hint">BIP-39 #<span id="bip39-index"></span></div>
            </div>
        </div>
    </div>

    <div class="footer">0xC1PH3R DECRYPTION UNIT — CYPHERPUNK 2140</div>

    <script>
        const BITS = 11;
        const REGISTERS = [0b10100011110, 0b00011100101, 0b11011110001];
        const TARGET = 1379;
        const TARGET_WORD = "proof";

        let shifts = [0, 0, 0];
        let currentOp = -1;

        // === BUILD UI ===
        function init() {
            const group = document.getElementById('rotor-group');
            group.innerHTML = '';

            for (let r = 0; r < 3; r++) {
                // Rotor block
                const block = document.createElement('div');
                block.className = 'rotor-block';

                // Row: label + bits + controls
                const row = document.createElement('div');
                row.className = 'rotor-row';
                row.innerHTML = `
      <div class="rotor-label">R${r + 1}</div>
      <div class="rotor-display" id="display-${r}">
        ${Array.from({ length: BITS }, (_, b) =>
                    `<div class="bit-cell" id="bit-${r}-${b}">0</div>`
                ).join('')}
      </div>
      <div class="rotor-controls">
        <button class="shift-btn" data-rotor="${r}" data-dir="-1" aria-label="Shift left">◀</button>
        <div class="shift-value" id="shift-val-${r}">0</div>
        <button class="shift-btn" data-rotor="${r}" data-dir="1" aria-label="Shift right">▶</button>
      </div>
    `;
                block.appendChild(row);

                // Indicator pips
                const indicator = document.createElement('div');
                indicator.className = 'shift-indicator';
                indicator.id = `indicator-${r}`;
                for (let i = 0; i < BITS; i++) {
                    const pip = document.createElement('div');
                    pip.className = 'shift-pip' + (i === 0 ? ' zero-marker' : '');
                    pip.id = `pip-${r}-${i}`;
                    indicator.appendChild(pip);
                }
                block.appendChild(indicator);
                group.appendChild(block);
            }

            // Swipe hint
            const hint = document.createElement('div');
            hint.className = 'swipe-hint';
            hint.textContent = '◀ SWIPE ROTORS TO SHIFT ▶';
            group.appendChild(hint);

            // Output bits
            const outBits = document.getElementById('output-bits');
            outBits.innerHTML = Array.from({ length: BITS }, (_, b) =>
                `<div class="out-bit" id="out-${b}">-</div>`
            ).join('');

            setupButtons();
            setupSwipe();
            updateIndicators();
            updateAll();
        }

        // === BUTTONS ===
        function setupButtons() {
            document.querySelectorAll('.shift-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.preventDefault();
                    shiftRotor(parseInt(btn.dataset.rotor), parseInt(btn.dataset.dir));
                });
            });
            document.querySelectorAll('.op-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.preventDefault();
                    setOp(parseInt(btn.dataset.op));
                });
            });
        }

        // === SWIPE ===
        function setupSwipe() {
            const THRESHOLD = 30;
            for (let r = 0; r < 3; r++) {
                const display = document.getElementById(`display-${r}`);
                let startX = null, accum = 0;

                display.addEventListener('touchstart', e => {
                    startX = e.touches[0].clientX; accum = 0;
                    display.classList.add('swiping');
                }, { passive: true });

                display.addEventListener('touchmove', e => {
                    if (startX === null) return;
                    e.preventDefault();
                    const delta = e.touches[0].clientX - startX;
                    const steps = Math.floor((delta - accum * THRESHOLD) / THRESHOLD);
                    if (steps !== 0) {
                        const dir = steps > 0 ? 1 : -1;
                        for (let s = 0; s < Math.abs(steps); s++) shiftRotor(r, dir);
                        accum += steps;
                    }
                }, { passive: false });

                display.addEventListener('touchend', () => {
                    startX = null; accum = 0; display.classList.remove('swiping');
                }, { passive: true });

                display.addEventListener('touchcancel', () => {
                    startX = null; accum = 0; display.classList.remove('swiping');
                }, { passive: true });

                // Mouse for desktop testing
                let mDown = false, mStartX = null, mAccum = 0;
                display.addEventListener('mousedown', e => {
                    mDown = true; mStartX = e.clientX; mAccum = 0;
                    display.classList.add('swiping'); e.preventDefault();
                });
                document.addEventListener('mousemove', e => {
                    if (!mDown) return;
                    const delta = e.clientX - mStartX;
                    const steps = Math.floor((delta - mAccum * THRESHOLD) / THRESHOLD);
                    if (steps !== 0) {
                        const dir = steps > 0 ? 1 : -1;
                        for (let s = 0; s < Math.abs(steps); s++) shiftRotor(r, dir);
                        mAccum += steps;
                    }
                });
                document.addEventListener('mouseup', () => {
                    if (mDown) { mDown = false; mStartX = null; mAccum = 0; display.classList.remove('swiping'); }
                });
            }
        }

        // === LOGIC ===
        function rotateRight(val, n) {
            n = ((n % BITS) + BITS) % BITS;
            return ((val >>> n) | (val << (BITS - n))) & ((1 << BITS) - 1);
        }

        function getShifted(r) { return rotateRight(REGISTERS[r], shifts[r]); }

        function computeOutput() {
            if (currentOp === -1) return null;
            let res = getShifted(0);
            for (let r = 1; r < 3; r++) {
                switch (currentOp) {
                    case 0: res = res & getShifted(r); break;
                    case 1: res = res | getShifted(r); break;
                    case 2: res = res ^ getShifted(r); break;
                }
            }
            return res;
        }

        function shiftRotor(idx, dir) {
            shifts[idx] = ((shifts[idx] + dir) % BITS + BITS) % BITS;
            updateAll();
        }

        function setOp(op) {
            currentOp = currentOp === op ? -1 : op;
            document.querySelectorAll('.op-btn').forEach(btn =>
                btn.classList.toggle('active', parseInt(btn.dataset.op) === currentOp)
            );
            updateAll();
        }

        function updateIndicators() {
            for (let r = 0; r < 3; r++) {
                for (let i = 0; i < BITS; i++) {
                    document.getElementById(`pip-${r}-${i}`).classList.toggle('active', i === shifts[r]);
                }
            }
        }

        function updateAll() {
            // Rotor bit displays
            for (let r = 0; r < 3; r++) {
                const shifted = getShifted(r);
                for (let b = 0; b < BITS; b++) {
                    const bit = (shifted >> (BITS - 1 - b)) & 1;
                    const cell = document.getElementById(`bit-${r}-${b}`);
                    cell.textContent = bit;
                    cell.classList.toggle('highlight', bit === 1);
                }
                document.getElementById(`shift-val-${r}`).textContent = shifts[r];
            }
            updateIndicators();

            const output = computeOutput();
            const section = document.getElementById('output-section');
            const resultDiv = document.getElementById('bip39-result');
            const statusBar = document.getElementById('status-bar');

            if (output === null) {
                for (let b = 0; b < BITS; b++) document.getElementById(`out-${b}`).textContent = '-';
                document.getElementById('output-dec').textContent = '----';
                section.className = 'output-section no-op';
                resultDiv.classList.remove('visible');
                statusBar.innerHTML =
                    '<div class="status-dot"></div><span>SYSTEM READY — SELECT OPERATION</span>';
                return;
            }

            section.classList.remove('no-op');
            for (let b = 0; b < BITS; b++) {
                document.getElementById(`out-${b}`).textContent = (output >> (BITS - 1 - b)) & 1;
            }
            document.getElementById('output-dec').textContent = String(output).padStart(4, '0');

            if (output === TARGET) {
                section.className = 'output-section success';
                resultDiv.classList.add('visible');
                document.getElementById('bip39-word').textContent = TARGET_WORD;
                document.getElementById('bip39-index').textContent = TARGET;
                statusBar.innerHTML =
                    '<div class="status-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></div>' +
                    '<span style="color:var(--green)">DECRYPTION COMPLETE — WORD RECOVERED</span>';
            } else {
                section.className = 'output-section';
                resultDiv.classList.remove('visible');
                statusBar.innerHTML =
                    '<div class="status-dot"></div><span>SYSTEM READY — AWAITING CONFIGURATION</span>';
            }
        }

        init();
    </script>
</body>

</html>
