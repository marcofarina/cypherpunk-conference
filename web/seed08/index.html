        * {

            position: fixed;

        body::after {
            content: '';
            position: fixed;
            inset: 0;

            pointer-events: none;
            z-index: 1000;

            content: '';

            pointer-events: none;
            z-index: 999;

            left: 0;

            function resolvePath(p) {
                if (!p) return cwd;
                let base = p.startsWith('/') ? '' : cwd;
                let full = base ? base + '/' + p : p;
                const parts = full.split('/').filter(Boolean);
                const resolved = [];
                for (const part of parts) {
                    if (part === '.') continue;
                    if (part === '..') { resolved.pop(); continue; }
                    resolved.push(part);
                }
                return '/' + resolved.join('/');

                return node;

                const bits = [
                    (n >> 6) & 7,
                    (n >> 3) & 7,
                    n & 7
                ];
                let s = isDir ? 'd' : '-';
                for (const b of bits) {
                    s += (b & 4) ? 'r' : '-';
                    s += (b & 2) ? 'w' : '-';
                    s += (b & 1) ? 'x' : '-';

                return s;

                }

                if (node.type === 'dir') {

                // Check executable

                    if (aDir !== bDir) return aDir - bDir;
                    return a.localeCompare(b);
                });

                if (showAll) {
                    // Add . and ..
                    names = ['.', '..', ...names];
                }

                if (longFormat) {
                    // total line
                    const totalBlocks = names.filter(n => n !== '.' && n !== '..').reduce((acc, n) => {
                        const child = node.children[n];
                        return acc + (child ? Math.ceil((child.size || 0) / 1024) * 4 : 0);
                    }, 0);
                    printLine(`total ${totalBlocks}`, 'dim');

                    for (const name of names) {
                        if (name === '.') {
                            printLsLongLine('.', node);
                        } else if (name === '..') {
                            // Get parent
                            const parentPath = path === '/' ? '/' : resolvePath(path + '/..');
                            const parentNode = getNode(parentPath) || node;
                            printLsLongLine('..', parentNode);
                        } else {
                            printLsLongLine(name, node.children[name]);
                        }
                    }
                } else {
                    // Simple listing — columns
                    const parts = [];
                    for (const name of names) {
                        if (name === '.' || name === '..') {
                            parts.push(`<span class="file-dir">${name}</span>`);
                        } else {
                            parts.push(colorizeFilename(name, node.children[name]));
                        }
                    }
                    if (parts.length > 0) {
                        printHTML(parts.join('  '));
                    }
                }
            }

            function printLsLongLine(name, node) {
                const permStr = permToString(node.perm, node.type === 'dir');
                const links = node.type === 'dir' ? (node.children ? Object.keys(node.children).length + 2 : 2) : 1;
                const owner = padRight(node.owner, 7);
                const size = padLeft(String(node.size), 5);
                const date = shortDate(node.modified);

                let nameHtml;
                if (name === '.' || name === '..') {
                    nameHtml = `<span class="file-dir">${name}</span>`;
                } else {
                    nameHtml = colorizeFilename(name, node);
                }

                const html = `${colorizePerms(permStr)} ${links} <span class="owner-col">${owner}</span> <span class="size-col">${size}</span> <span class="date-col">${date}</span> ${nameHtml}`;
                printHTML(html);
            }

            function shortDate(d) {
                // "2026-02-14 03:38" → "Feb 14 03:38"
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const parts = d.split(/[- :]/);
                const mon = months[parseInt(parts[1], 10) - 1] || '???';
                const day = padLeft(String(parseInt(parts[2], 10)), 2);
                const time = parts[3] + ':' + parts[4];
                return mon + ' ' + day + ' ' + time;
            }

            function padRight(s, n) { return s + ' '.repeat(Math.max(0, n - s.length)); }
            function padLeft(s, n) { return ' '.repeat(Math.max(0, n - s.length)) + s; }

            // ── pwd Command ─────────────────────────────────────────────────────

            function cmdPwd() {
                printLine(cwd);
            }

            // ── cd Command ──────────────────────────────────────────────────────

            function cmdCd(args) {
                const target = args[0] || '~';
                let dest;

                if (target === '~' || target === '') {
                    dest = HOME;
                } else if (target === '-') {
                    printLine('cd: OLDPWD non impostato', 'err');
                    return;
                } else {
                    dest = resolvePath(target);
                }

                const node = getNode(dest);

                if (!node) {
                    printLine(`cd: ${target}: directory non trovata`, 'err');
                    return;
                }

                if (node.type !== 'dir') {
                    printLine(`cd: ${target}: non è una directory`, 'err');
                    return;
                }

                cwd = dest;
            }

            // ── cat Command ─────────────────────────────────────────────────────

            function cmdCat(args) {
                if (args.length === 0) {
                    printLine('cat: argomento mancante', 'err');
                    return;
                }

                for (const arg of args) {
                    if (arg.startsWith('-')) continue;

                    const path = resolvePath(arg);
                    const node = getNode(path);

                    if (!node) {
                        printLine(`cat: ${arg}: file non trovato`, 'err');
                        continue;
                    }

                    if (node.type === 'dir') {
                        printLine(`cat: ${arg}: è una directory`, 'err');
                        continue;
                    }

                    // Permission check — owner read bit
                    const ownerBits = (parseInt(node.perm, 8) >> 6) & 7;
                    const canRead = (ownerBits & 4) !== 0;

                    if (!canRead) {
                        printLine(`cat: ${arg}: permesso negato`, 'err');
                        continue;
                    }

                    // Check if this is the seed file — special reveal
                    if (path === '/home/c1ph3r/.vault/seed.key') {
                        printLine('', 'out');
                        printLine('╔════════════════════════════════╗', 'reveal-border');
                        printLine('║   SEED WORD #8 — DECRYPTED     ║', 'reveal');
                        printLine('║                                ║', 'reveal-border');
                        printLine('║   BIP-39 position: 488         ║', 'reveal-num');
                        printLine('║                                ║', 'reveal-border');
                        printLine('╚════════════════════════════════╝', 'reveal-border');
                        printLine('', 'out');
                        continue;
                    }

                    // Print content
                    const lines = node.content.split('\n');
                    for (const line of lines) {
                        printLine(line);
                    }
                }
            }

            // ── chmod Command ───────────────────────────────────────────────────

            function cmdChmod(args) {
                if (args.length < 2) {
                    printLine('chmod: argomenti mancanti — uso: chmod <modo> <file>', 'err');
                    return;
                }

                const mode = args[0];
                const target = args[1];
                const path = resolvePath(target);
                const node = getNode(path);

                if (!node) {
                    printLine(`chmod: ${target}: file non trovato`, 'err');
                    return;
                }

                if (node.type === 'dir') {
                    printLine(`chmod: ${target}: operazione non supportata sulle directory`, 'err');
                    return;
                }

                // Parse symbolic modes: +r, +rw, +rx, +rwx, -r, -w, -x, etc.
                const symbolicMatch = mode.match(/^([+-])([rwx]+)$/);
                if (symbolicMatch) {
                    const op = symbolicMatch[1];
                    const chars = symbolicMatch[2];
                    let current = parseInt(node.perm, 8);

                    let bits = 0;
                    if (chars.includes('r')) bits |= 0o444;
                    if (chars.includes('w')) bits |= 0o222;
                    if (chars.includes('x')) bits |= 0o111;

                    if (op === '+') {
                        current |= bits;
                    } else {
                        current &= ~bits;
                    }

                    node.perm = current.toString(8).padStart(3, '0');
                    return;
                }

                // Parse octal mode: 644, 755, 400, etc.
                const octalMatch = mode.match(/^[0-7]{3,4}$/);
                if (octalMatch) {
                    const oct = mode.slice(-3);
                    node.perm = oct;
                    return;
                }

                printLine(`chmod: modo non valido: '${mode}'`, 'err');
                printLine('  Formati accettati: +r, +rw, -x, 644, 755, ...', 'dim');
            }

            // ── history Command ─────────────────────────────────────────────────

            function cmdHistory() {
                const histFile = getNode('/home/c1ph3r/.bash_history');
                if (histFile && histFile.content) {
                    const lines = histFile.content.split('\n');
                    lines.forEach((line, i) => {
                        printLine(`  ${padLeft(String(i + 1), 4)}  ${line}`, 'dim');
                    });
                }
            }

            // ── whoami / id / uname ─────────────────────────────────────────────

            function cmdWhoami() {
                printLine(USER);
            }

            function cmdId() {
                printLine(`uid=1000(${USER}) gid=1000(${USER}) groups=1000(${USER})`);
            }

            function cmdUname(args) {
                if (args.includes('-a')) {
                    printLine('Linux onion-route 5.15.0-94-generic #104-Ubuntu SMP x86_64 GNU/Linux');
                } else {
                    printLine('Linux');
                }
            }

            // ── echo Command ────────────────────────────────────────────────────

            function cmdEcho(args) {
                printLine(args.join(' '));
            }

            // ── grep Command (simplified) ───────────────────────────────────────

            function cmdGrep(args) {
                if (args.length < 2) {
                    printLine('grep: uso: grep <pattern> <file>', 'err');
                    return;
                }

                const pattern = args[0];
                const target = args[1];
                const path = resolvePath(target);
                const node = getNode(path);

                if (!node) {
                    printLine(`grep: ${target}: file non trovato`, 'err');
                    return;
                }

                if (node.type === 'dir') {
                    printLine(`grep: ${target}: è una directory`, 'err');
                    return;
                }

                const ownerBits = (parseInt(node.perm, 8) >> 6) & 7;
                if (!(ownerBits & 4)) {
                    printLine(`grep: ${target}: permesso negato`, 'err');
                    return;
                }

                const lines = node.content.split('\n');
                let found = false;
                for (const line of lines) {
                    if (line.toLowerCase().includes(pattern.toLowerCase())) {
                        // Highlight match
                        const idx = line.toLowerCase().indexOf(pattern.toLowerCase());
                        const before = escapeHTML(line.slice(0, idx));
                        const match = escapeHTML(line.slice(idx, idx + pattern.length));
                        const after = escapeHTML(line.slice(idx + pattern.length));
                        printHTML(`${before}<span style="color:#ff3333;font-weight:700">${match}</span>${after}`);
                        found = true;
                    }
                }
                if (!found) {
                    // No output, like real grep
                }
            }

            // ── file Command ────────────────────────────────────────────────────

            function cmdFile(args) {
                if (args.length === 0) {
                    printLine('file: argomento mancante', 'err');
                    return;
                }

                const target = args[0];
                const path = resolvePath(target);
                const node = getNode(path);

                if (!node) {
                    printLine(`file: ${target}: file non trovato`, 'err');
                    return;
                }

                if (node.type === 'dir') {
                    printLine(`${target}: directory`);
                } else if (node.perm === '000') {
                    printLine(`${target}: regular file (permessi insufficienti per l'analisi)`);
                } else if (target.endsWith('.sh')) {
                    printLine(`${target}: Bourne-Again shell script, ASCII text executable`);
                } else if (target.endsWith('.py')) {
                    printLine(`${target}: Python script, UTF-8 Unicode text executable`);
                } else if (target.endsWith('.hex')) {
                    printLine(`${target}: ASCII text (hex dump)`);
                } else if (target.endsWith('.key')) {
                    printLine(`${target}: ASCII text`);
                } else {
                    printLine(`${target}: ASCII text`);
                }
            }

            // ── Command Router ──────────────────────────────────────────────────

            function execCommand(raw) {
                const trimmed = raw.trim();
                if (!trimmed) return;

                printPromptEcho(trimmed);

                // Parse
                const parts = trimmed.split(/\s+/);
                const cmd = parts[0];
                const args = parts.slice(1);

                switch (cmd) {
                    case 'ls':
                        cmdLs(args);
                        break;
                    case 'pwd':
                        cmdPwd();
                        break;
                    case 'cd':
                        cmdCd(args);
                        break;
                    case 'cat':
                        cmdCat(args);
                        break;
                    case 'chmod':
                        cmdChmod(args);
                        break;
                    case 'history':
                        cmdHistory();
                        break;
                    case 'whoami':
                        cmdWhoami();
                        break;
                    case 'id':
                        cmdId();
                        break;
                    case 'uname':
                        cmdUname(args);
                        break;
                    case 'echo':
                        cmdEcho(args);
                        break;
                    case 'clear':
                        outputArea.innerHTML = '';
                        break;
                    case 'help':
                        printLine('Comandi disponibili:', 'info');
                        printLine('  ls [-l] [-a] [dir]    elenca file e directory', 'dim');
                        printLine('  cd <dir>              cambia directory', 'dim');
                        printLine('  cat <file>            mostra il contenuto di un file', 'dim');
                        printLine('  chmod <modo> <file>   cambia i permessi di un file', 'dim');
                        printLine('  pwd                   mostra la directory corrente', 'dim');
                        printLine('  history               mostra la cronologia dei comandi', 'dim');
                        printLine('  whoami                mostra l\'utente corrente', 'dim');
                        printLine('  id                    mostra UID e gruppi', 'dim');
                        printLine('  uname [-a]            informazioni di sistema', 'dim');
                        printLine('  echo <testo>          stampa testo', 'dim');
                        printLine('  clear                 pulisce lo schermo', 'dim');
                        printLine('  help                  mostra questo messaggio', 'dim');
                        break;
                    case 'sudo':
                        printLine(`[sudo] password per ${USER}: `, 'out');
                        printLine(`${USER} non è nel file sudoers. Questo incidente verrà segnalato.`, 'err');
                        break;
                    case 'rm':
                    case 'rmdir':
                    case 'mv':
                    case 'cp':
                    case 'mkdir':
                    case 'touch':
                    case 'nano':
                    case 'vi':
                    case 'vim':
                        printLine(`${cmd}: operazione di scrittura non consentita — filesystem in modalità protetta`, 'err');
                        break;
                    case 'exit':
                    case 'logout':
                        printLine('Logout non consentito — sessione ripristinata da snapshot.', 'err');
                        break;
                    case 'ssh':
                    case 'ping':
                    case 'curl':
                    case 'wget':
                        printLine(`${cmd}: rete non disponibile — tutte le interfacce sono state disabilitate`, 'err');
                        break;
                    case 'grep':
                        cmdGrep(args);
                        break;
                    case 'file':
                        cmdFile(args);
                        break;
                    case 'll':
                        cmdLs(['-la', ...args]);
                        break;
                    default:
                        printLine(`${cmd}: comando non trovato. Digita 'help' per la lista dei comandi.`, 'err');
                }

                scrollToBottom();
            }

            // ── Prompt ───────────────────────────────────────────────────────────

            function updatePrompt() {
                const path = getDisplayPath(cwd);
                promptLabel.textContent = `${USER}@${HOSTNAME}:${path}$ `;
            }

            // ── Input Handling ──────────────────────────────────────────────────

            const COMMANDS = ['ls', 'cd', 'cat', 'chmod', 'pwd', 'history', 'whoami', 'id', 'uname', 'echo', 'clear', 'help', 'grep', 'file', 'll'];

            function tabComplete(input) {
                const val = input.value;
                const cursorPos = input.selectionStart;
                const beforeCursor = val.slice(0, cursorPos);
                const parts = beforeCursor.split(/\s+/);

                if (parts.length <= 1) {
                    // Complete command name
                    const prefix = parts[0] || '';
                    const matches = COMMANDS.filter(c => c.startsWith(prefix) && c !== prefix);
                    if (matches.length === 1) {
                        input.value = matches[0] + ' ' + val.slice(cursorPos);
                        input.selectionStart = input.selectionEnd = matches[0].length + 1;
                    }
                    return;
                }

                // Complete file/directory path
                const partial = parts[parts.length - 1];

                // Split into directory part and name prefix
                let dirPart, namePrefix;
                const lastSlash = partial.lastIndexOf('/');
                if (lastSlash >= 0) {
                    dirPart = partial.slice(0, lastSlash) || '/';
                    namePrefix = partial.slice(lastSlash + 1);
                } else {
                    dirPart = null;
                    namePrefix = partial;
                }

                const lookupDir = dirPart ? resolvePath(dirPart) : cwd;
                const dirNode = getNode(lookupDir);
                if (!dirNode || dirNode.type !== 'dir' || !dirNode.children) return;

                const candidates = Object.keys(dirNode.children).filter(n => {
                    if (!n.startsWith(namePrefix)) return false;
                    // Don't complete hidden files unless explicitly typing the dot
                    if (n.startsWith('.') && !namePrefix.startsWith('.')) return false;
                    return true;
                });
                if (candidates.length === 0) return;

                if (candidates.length === 1) {
                    const match = candidates[0];
                    const matchNode = dirNode.children[match];
                    const completed = (dirPart ? dirPart + '/' : '') + match + (matchNode.type === 'dir' ? '/' : '');
                    // Reconstruct the input
                    const prefix = parts.slice(0, -1).join(' ') + ' ';
                    const after = val.slice(cursorPos);
                    input.value = prefix + completed + after;
                    input.selectionStart = input.selectionEnd = prefix.length + completed.length;
                } else {
                    // Find longest common prefix among candidates
                    let common = candidates[0];
                    for (let i = 1; i < candidates.length; i++) {
                        let j = 0;
                        while (j < common.length && j < candidates[i].length && common[j] === candidates[i][j]) j++;
                        common = common.slice(0, j);
                    }
                    if (common.length > namePrefix.length) {
                        const completed = (dirPart ? dirPart + '/' : '') + common;
                        const prefix = parts.slice(0, -1).join(' ') + ' ';
                        const after = val.slice(cursorPos);
                        input.value = prefix + completed + after;
                        input.selectionStart = input.selectionEnd = prefix.length + completed.length;
                    } else {
                        // Show candidates in output
                        printPromptEcho(val);
                        const display = candidates.map(n => {
                            const nd = dirNode.children[n];
                            return nd.type === 'dir'
                                ? `<span class="file-dir">${escapeHTML(n)}/</span>`
                                : `<span class="file-normal">${escapeHTML(n)}</span>`;
                        });
                        printHTML(display.join('  '));
                        scrollToBottom();
                    }
                }
            }

            cmdInput.addEventListener('keydown', function (e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    tabComplete(cmdInput);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = cmdInput.value;
                    if (val.trim()) {
                        history.unshift(val);
                        if (history.length > 50) history.pop();
                    }
                    historyIdx = -1;
                    execCommand(val);
                    cmdInput.value = '';
                    updatePrompt();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIdx < history.length - 1) {
                        historyIdx++;
                        cmdInput.value = history[historyIdx];
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIdx > 0) {
                        historyIdx--;
                        cmdInput.value = history[historyIdx];
                    } else {
                        historyIdx = -1;
                        cmdInput.value = '';
                    }
                }
            });

            // Focus input on tap anywhere
            document.getElementById('terminal').addEventListener('click', function () {
                cmdInput.focus();
            });

            cmdInput.addEventListener('focus', function () {
                setTimeout(scrollToBottom, 300); // delay for keyboard animation
            });

            // ── iOS/Android Keyboard Handling ───────────────────────────────────
            // visualViewport shrinks when the virtual keyboard opens.
            // We resize #terminal to match, keeping input visible and output scrollable.

            function handleViewportResize() {
                const vv = window.visualViewport;
                if (!vv) return;
                const terminal = document.getElementById('terminal');
                terminal.style.height = vv.height + 'px';
                terminal.style.top = vv.offsetTop + 'px';
                scrollToBottom();
            }

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', handleViewportResize);
                window.visualViewport.addEventListener('scroll', handleViewportResize);
            }

            // Prevent iOS bounce/scroll on the body
            document.addEventListener('touchmove', function (e) {
                if (e.target.closest('#output-area')) return; // allow scrolling in output
                e.preventDefault();
            }, { passive: false });

            // ── Boot Sequence ───────────────────────────────────────────────────

            function boot() {
                const lines = [
                    { text: '[SYSTEM] Restoring session from snapshot...', cls: 'dim', delay: 0 },
                    { text: '[SYSTEM] Filesystem mounted (read-write)', cls: 'dim', delay: 400 },
                    { text: '[SYSTEM] User: c1ph3r — UID 1000', cls: 'dim', delay: 700 },
                    { text: '[SYSTEM] Last login: 2026-02-14 03:41 UTC from 127.0.0.1', cls: 'dim', delay: 1000 },
                    { text: '', cls: 'out', delay: 1200 },
                    { text: '  "Cypherpunks write code." — Eric Hughes, 1993', cls: 'info', delay: 1400 },
                    { text: '', cls: 'out', delay: 1500 },
                    { text: 'Digita \'help\' per la lista dei comandi disponibili.', cls: 'dim', delay: 1700 },
                    { text: '', cls: 'out', delay: 1800 },
                ];

                cmdInput.disabled = true;

                lines.forEach(({ text, cls, delay }) => {
                    setTimeout(() => {
                        printLine(text, cls);
                        scrollToBottom();
                    }, delay);
                });

                setTimeout(() => {
                    cmdInput.disabled = false;
                    cmdInput.focus();
                    updatePrompt();
                }, 2000);
            }

            boot();

        })();
    </script>
